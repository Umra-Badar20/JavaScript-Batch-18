<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button onclick="showList()">Show List</button>
    <div id="ListContainer">
      <h1>Show List Here:</h1>
    </div>
    <img
      class="car"
      id="car"
      src="https://media.wired.com/photos/63b8d0a771c6b526845f15a6/master/pass/CES-2023-PEUGEOT_INCEPTION_CONCEPT_2301CN202.jpg"
      alt=""
    />
    <button onclick="showImg()">Show Image</button>
    <button onclick="hideImg()">Hide Image</button>

    <img
      class="juice"
      onmouseover="makeBigger()"
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBuLNi2K6LKTpv4GWxZAom45mDx3tMNvcLXw&s"
      alt=""
    /><br /> 
     <!-- <div class="juice"></div> -->

    <img onclick="previous()"
      width="100px"
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKWhG35cYGU-QoGe36F1CSBjp1n83D4nGeTg&s"
      alt=""
    />
    <img id="cake"
      width="500px"
      src="https://ichef.bbci.co.uk/food/ic/food_16x9_1600/recipes/easy_chocolate_cake_31070_16x9.jpg"
      alt=""
    />
    <img
      width="100px"
      src="https://images.icon-icons.com/67/PNG/512/next_13716.png"
      alt="" onclick="next()"
    />
    <script src="app.js"></script>
  </body>
</html>
